stages:
  - build
  - test
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_REGISTRY_IMAGE_TAG

build:
  stage: build
  image: docker:24
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_NAME .
    - docker push $IMAGE_NAME
  only:
    - main
    - develop

test:
  stage: test
  image: debian:bookworm-slim
  before_script:
    - apt-get update && apt-get install -y ca-certificates libwebp7
  script:
    - echo "Running basic checks (no tests available)"
    - ./app --version || echo "Version check not implemented, skipping"
    - test -f ./app && echo "Binary exists"
  only:
    - main
    - develop

deploy:
  stage: deploy
  image: docker:24
  services:
    - docker:dind
  script:
    - echo "Deploying $IMAGE_NAME..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $IMAGE_NAME
    - echo "Add deployment commands here (e.g., deploy to Kubernetes, ECS, or a server)"
  only:
    - main