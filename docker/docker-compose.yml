services:
  postgres:
    image: postgres:16-bookworm
    container_name: pashmak_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pashmak_postgres
    volumes:
      - type: volume
        source: pashmak_postgres
        target: /var/lib/postgresql/data
    ports:
      - 127.0.0.1:5432:5432

  redis:
    image: redis:latest
    container_name: pashmak_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pashmak_postgres:
  redis: