darkube_build_backend_bluh-bluh_hamravesh-c13:
  image: hamravesh.hamdocker.ir/public/darkube-cli:v1.1
  interruptible: true
  only:
    refs:
      - main
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin registry.hamdocker.ir
  script:
    - docker build -t registry.hamdocker.ir/bluh-bluh/pashmak-backend:1.0.5 -f ./Dockerfile .
    - docker push registry.hamdocker.ir/bluh-bluh/pashmak-backend:1.0.5
  stage: build

